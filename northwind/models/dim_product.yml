version: 2

models:
  - name: dim_product
    description: Product Dimension. One row per product.

    columns:
      - name: productkey
        description: The surrogate key of the product
        tests:
          - not_null
          - unique

      - name: productid
        description: The business / source key of the product
        tests:
          - not_null
          - unique

      - name: productname
        description: The name of the product

      - name: supplierkey
        description: Surrogate key for the supplier, derived from supplierid. Foreign key to dim_supplier.

      - name: categoryname
        description: The name of the category the product belongs to

      - name: categorydescription
        description: A text description of the product category