version: 2

models:
  - name: dim_customer
    description: Customer Dimension. One row per customer.
    columns:
      - name: customerkey
        description: The surrogate key of the customer
        tests:
          - not_null
          - unique
      - name: customerid
        description: The business / source key of the customer
        tests:
          - not_null
          - unique
      - name: companyname
        description: The name of the customer company
      - name: contactname
        description: The full name of the primary contact at the customer company
      - name: contacttitle
        description: The job title of the primary contact
      - name: address
        description: The street address of the customer
      - name: city
        description: The city of the customer address
      - name: region
        description: The region or state of the customer address
      - name: postalcode
        description: The postal code of the customer address
      - name: country
        description: The country of the customer address
      - name: phone
        description: The phone number of the customer
      - name: fax
        description: The fax number of the customer